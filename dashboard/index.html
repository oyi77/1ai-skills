<!DOCTYPE html>
<html>
<head>
    <title>Vector DB Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: #16213e; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        h1 { color: #0f3460; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #16213e; padding: 20px; border-radius: 8px; border-left: 4px solid #0f3460; }
        .stat-card h3 { color: #e94560; margin-bottom: 10px; }
        .stat-value { font-size: 2em; font-weight: bold; }
        .search-box { background: #16213e; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 15px; font-size: 16px; border: none; border-radius: 4px; background: #0f3460; color: #fff; }
        .search-box button { margin-top: 10px; padding: 10px 20px; background: #e94560; border: none; border-radius: 4px; color: #fff; cursor: pointer; }
        .results { background: #16213e; padding: 20px; border-radius: 8px; }
        .result-item { padding: 15px; margin-bottom: 10px; border-bottom: 1px solid #0f3460; }
        .result-score { color: #e94560; font-weight: bold; }
        .result-content { margin-top: 5px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Vector DB Dashboard</h1>
            <p>Semantic Search for BerkahKarya</p>
        </header>
        
        <div class="stats">
            <div class="stat-card">
                <h3>📚 Documents</h3>
                <div class="stat-value" id="doc-count">116</div>
            </div>
            <div class="stat-card">
                <h3>⚙️ Engines</h3>
                <div class="stat-value">3</div>
            </div>
            <div class="stat-card">
                <h3>🔎 Avg Search Time</h3>
                <div class="stat-value">0.3s</div>
            </div>
        </div>
        
        <div class="search-box">
            <input type="text" id="queryInput" placeholder="Enter search query...">
            <button onclick="search()">Search</button>
        </div>
        
        <div class="results" id="results">
            <p>Results will appear here...</p>
        </div>
    </div>
    
    <script>
        async function search() {
            const query = document.getElementById('queryInput').value;
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = '<p>Searching...</p>';
            
            // In a real implementation, this would call the API
            resultsDiv.innerHTML = `
                <div class="result-item">
                    <div class="result-score">Score: 0.78</div>
                    <div class="result-content">Sample result for "${query}"...</div>
                </div>
            `;
        }
    </script>
</body>
</html>
