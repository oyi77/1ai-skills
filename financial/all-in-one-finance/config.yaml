# All-in-One Finance Skills — Configuration
# Copy to config.yaml and customize before deployment

# ============================================
# RISK PROFILE
# ============================================
risk_profile: moderate           # conservative | moderate | aggressive

# Position sizing limits
max_position_size: 0.05        # 5% of portfolio per position (conservative: 0.03, aggressive: 0.08)
max_sector_concentration: 0.25  # 25% max in single sector
max_correlated_cluster: 0.30     # 30% max in correlated assets
max_leverage: 1.5               # Gross exposure limit (1.0 = no leverage, 2.0 = 2x)

# Drawdown limits
max_drawdown: 0.15              # 15% portfolio-level hard stop
daily_stop: 0.02                 # 2% daily loss circuit breaker
losing_streak_reduce: 3           # Reduce size after N consecutive losses
losing_streak_review: 5           # Mandatory strategy review after N losses

# ============================================
# JURISDICTION & COMPLIANCE
# ============================================
jurisdiction: GLOBAL             # US | EU | UK | SG | ID | JP | GLOBAL

compliance:
  mifid_ii: false               # EU: MiFID II appropriateness checks
  eu_ai_act: false              # EU: AI Act compliance (high-risk systems)
  fca_conduct: false             # UK: FCA consumer duty
  sec_regulation: true           # US: SEC registered securities only
  cftc_rules: true              # US: CFTC derivatives rules
  disclaimer: true               # Always append disclaimer to trade recommendations
  record_keeping: true           # Maintain audit trail of all recommendations

# ============================================
# DATA SOURCES
# ============================================
data_sources:
  equities:
    primary: yahoo_finance
    backup: alpha_vantage
    sec_filings: edgar.sec.gov
    earnings: earningscast.com
    insider_trades: sec.gov/edgar (Form 4)
  
  crypto:
    onchain: glassnode
    backup: cryptoquant
    explorer_btc: blockchain.com
    explorer_eth: etherscan.io
    explorer_sol: solscan.io
    defi: defillama.com
    mempool: mempool.space
    sentiment: alternative.me (Fear & Greed)
    
  macro:
    primary: fred.stlouisfed.org    # FRED API (Fed data)
    forex: oanda
    rates: bloomberg (if available) | fred
    
  news:
    primary: reuters
    crypto: coindesk | cointelegraph
    china: cailian (财联社)
    sentiment: stocktwits | reddit (WSB)
    earnings: seeking_alpha
    
  fixed_income:
    treasuries: fred (DGS10, DGS2, etc.)
    corporate: finra.org (TRACE)
    municipals: emma.msrb.org
    
  derivatives:
    options: cboe.com
    futures: cmegroup.com
    vix: cboe.com (VIX)

# ============================================
# MEMORY & AUDIT
# ============================================
memory:
  enabled: true
  audit_level: strict            # strict | standard | minimal
  owm_integration: true         # OwnWallerMind (OWM) for trade recall
  trade_log: true               # Log all recommendations with timestamps
  behavioral_tracking: true     # Track overtrading, revenge trading, FOMO
  min_trades_for_kelly: 30      # Minimum sample size for Kelly criterion

# ============================================
# OUTPUT SETTINGS
# ============================================
output:
  default_report_type: investment_memo  # investment_memo | quick_bullet | full_analysis
  include_logic_chain: true          # Show causal transmission in macro
  evidence_tier_breakdown: true     # Always show T1/T2/T3 composition
  confidence_scores: true           # Display 0.0-1.0 conviction
  variant_view_required: true       # Always articulate contrarian view
  pre_mortem_required: true        # Always run "if wrong, why?" analysis
  
  # Visualization options
  include_charts: false            # Set true if agent can render charts
  chart_theme: dark                # dark | light
  
  # Report formats
  formats:
    - markdown                     # Default readable format
    - json                         # Machine-readable for APIs
    # - pdf                        # Uncomment if PDF generation available

# ============================================
# EVIDENCE STANDARDS
# ============================================
evidence:
  t1_weight: 1.0                 # Primary source weight
  t2_weight: 0.7                 # Factual secondary weight
  t3_weight: 0.3                 # Opinion/social weight
  
  # Rules
  no_t3_only_recommendations: true  # Block actionable recs on T3-only
  min_t1_t2_percent: 0.50          # Conviction >0.5 needs ≥50% T1/T2
  flag_speculative_t3: true         # Always flag T3 as "speculative"
  require_url_verification: true    # T1 sources need direct URL + hash

# ============================================
# PRE-TRADE GATES (5-GATE SYSTEM)
# ============================================
gates:
  gate1_liquidity:
    enabled: true
    min_volume_ratio: 10            # Position ≤ 1/10 daily volume
    max_spread_equities: 0.005      # 0.5% max spread
    max_spread_crypto: 0.001        # 0.1% for large-cap crypto
    market_cap:
      full: 1e9                     # >$1B = full position
      reduced: 1e8                   # $100M-$1B = reduced
      skip: 1e8                      # <$100M = skip
    
  gate2_correlation:
    enabled: true
    max_correlation: 0.7            # With >20% of portfolio
    max_sector_weight: 0.30         # At full Kelly
    
  gate3_sentiment:
    enabled: true
    extreme_greed_skip_full: 85      # Fear & Greed >85 → no full longs
    extreme_fear_contrarian: 15      # <15 → contrarian longs valid
    
  gate4_memory:
    enabled: true
    min_historical_samples: 3         # Need 3+ similar past setups
    behavioral_drift_skip: true      # Skip if overtrading detected
    
  gate5_regulatory:
    enabled: true
    ofac_check: true                 # OFAC SDN list for crypto
    sec_unregistered_skip: true      # Skip unregistered securities (US)

# ============================================
# NOTIFICATIONS (OPTIONAL)
# ============================================
notifications:
  enabled: false
  # webhook: https://your-webhook.com/finance-alerts
  # events:
  #   - extreme_fear_buy_signal
  #   - extreme_greed_sell_signal
  #   - portfolio_drawdown_10pct
  #   - gate_skip_attempt

# ============================================
# BACKTESTING & VALIDATION
# ============================================
backtest:
  enabled: false
  # start_date: "2020-01-01"
  # end_date: "2025-12-31"
  # initial_capital: 100000
  # benchmark: SPY
