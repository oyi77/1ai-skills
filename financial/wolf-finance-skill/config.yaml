# Wolf Finance Skill — Configuration v2.0
# World-class institutional-grade finance intelligence

# ============================================
# RISK PROFILE
# ============================================
risk_profile: moderate           # conservative | moderate | aggressive | institutional

# Position sizing limits
max_position_size: 0.05          # 5% per position (conservative: 0.03, institutional: 0.10)
max_sector_concentration: 0.25   # 25% max in single sector
max_correlated_cluster: 0.30     # 30% max in correlated assets
max_leverage: 1.5                # Gross exposure (1.0 = no leverage)

# Drawdown circuit breakers
max_drawdown: 0.15               # 15% portfolio hard stop
daily_stop: 0.02                 # 2% daily loss circuit breaker
losing_streak_reduce: 3          # Reduce size after N consecutive losses
losing_streak_review: 5          # Mandatory review after N losses

# ============================================
# SELF-EVOLUTION (APEX)
# ============================================
self_evolution:
  enabled: true
  brier_score_target: 0.15       # Conviction calibration target
  module_retirement_f1: 0.40     # Retire module below this F1 score
  win_streak_overconfidence: 5   # Check overconfidence after N wins
  loss_streak_halt: 3            # Reduce size after N losses
  regime_detection: true         # Auto-detect market regime changes
  behavioral_drift_detection: true
  learning_loop_after_close: true

# ============================================
# JURISDICTION & COMPLIANCE
# ============================================
jurisdiction: GLOBAL             # US | EU | UK | SG | ID | JP | GLOBAL

compliance:
  mifid_ii: false                # EU: MiFID II checks
  eu_ai_act: false               # EU: AI Act compliance
  fca_conduct: false             # UK: FCA consumer duty
  mas_psa: false                 # SG: Payment Services Act (crypto)
  ojk_bappebti: false            # ID: OJK/BAPPEBTI regulations
  sec_regulation: true           # US: SEC registered securities
  cftc_rules: true               # US: CFTC derivatives rules
  fatf_compliance: true          # Global: AML/KYC standards
  ofac_check: true               # Global: Sanctions screening
  disclaimer: true               # Always append disclaimer
  record_keeping: true           # Audit trail maintenance

# ============================================
# DATA SOURCES
# ============================================
data_sources:
  equities:
    primary: yahoo_finance
    backup: alpha_vantage
    sec_filings: edgar.sec.gov
    earnings: earningscast.com
    insider_trades: sec.gov/edgar (Form 4)
    international: reuters | factset
    
  crypto:
    onchain: glassnode
    backup: cryptoquant
    explorer_btc: blockchain.com
    explorer_eth: etherscan.io
    explorer_sol: solscan.io
    defi: defillama.com
    mempool: mempool.space
    sentiment: alternative.me
    forensics: arkham.intel | chainalysis
    
  macro:
    primary: fred.stlouisfed.org
    forex: oanda | bis.org
    rates: fred | bloomberg
    imf_data: imf.org/data
    world_bank: databank.worldbank.org
    
  news:
    primary: reuters | bloomberg
    crypto: coindesk | cointelegraph
    china: cailian (财联社) | caixin
    indonesia: bisnis.com | kontan.co.id
    sentiment: stocktwits | reddit
    earnings: seeking_alpha | earningswhispers
    
  fixed_income:
    treasuries: fred (DGS10, DGS2)
    corporate: finra.org (TRACE)
    municipals: emma.msrb.org
    em_bonds: jpmorgan.com (EMBI)
    
  derivatives:
    options: cboe.com
    futures: cmegroup.com
    vix: cboe.com
    cot_reports: cftc.gov

  private_markets:
    pe_data: cambridge_associates | pitchbook
    re_data: costar | green_street
    hf_data: hfr | eurekahedge

# ============================================
# MODULE REGISTRY (22 MODULES)
# ============================================
modules:
  # Original 16 modules (inherited)
  - fin-equity-fundamental
  - fin-equity-technical
  - fin-crypto-onchain
  - fin-crypto-forensic
  - fin-macro-liquidity
  - fin-sentiment-engine
  - fin-forex-matrix
  - fin-commodity-cycle
  - fin-fixed-income
  - fin-options-derivatives
  - fin-risk-guardian
  - fin-algo-execution
  - fin-memory-protocol
  - fin-report-orchestrator
  - fin-news-aggregator
  - fin-predictor-kronos
  # New v2.0 modules
  - fin-corporate-finance      # M&A, LBO, IPO, WACC
  - fin-private-markets        # PE, VC, HF, Real Assets
  - fin-wealth-management      # Allocation, Tax, Estate
  - fin-quant-strategies       # Factor, Stat Arb, ML
  - fin-macro-geopolitical     # Geopolitics, Sanctions, EM crises
  - fin-compliance-kyc         # AML, KYC, Multi-jurisdiction

# ============================================
# EVIDENCE STANDARDS
# ============================================
evidence:
  t1_weight: 1.0
  t2_weight: 0.7
  t3_weight: 0.3
  no_t3_only_recommendations: true
  min_t1_t2_percent: 0.50
  flag_speculative_t3: true
  require_url_verification: true

# ============================================
# PRE-TRADE GATES
# ============================================
gates:
  gate1_liquidity:
    enabled: true
    min_volume_ratio: 10
    max_spread_equities: 0.005
    max_spread_crypto: 0.001
    market_cap_full: 1e9
    market_cap_reduced: 1e8
    market_cap_skip: 1e8
    
  gate2_correlation:
    enabled: true
    max_correlation: 0.7
    max_sector_weight: 0.30
    
  gate3_sentiment:
    enabled: true
    extreme_greed_threshold: 85
    extreme_fear_threshold: 15
    vix_reduce_above: 25
    vix_skip_above: 35
    
  gate4_memory:
    enabled: true
    min_historical_samples: 3
    behavioral_drift_skip: true
    consecutive_loss_skip: 3
    
  gate5_regulatory:
    enabled: true
    ofac_check: true
    sec_unregistered_skip: true
    jurisdiction_check: true

# ============================================
# OUTPUT SETTINGS
# ============================================
output:
  default_report_type: investment_memo
  include_logic_chain: true
  evidence_tier_breakdown: true
  confidence_scores: true
  variant_view_required: true
  pre_mortem_required: true
  anti_bias_checklist: true
  gate_result_shown: true
  
  formats:
    - markdown
    - json

# ============================================
# ANTI-BIAS ENFORCEMENT
# ============================================
anti_bias:
  enabled: true
  auto_run_before_recommendation: true
  red_flags_scan: true
  rationalization_defense: true
  composure_under_pressure: true
