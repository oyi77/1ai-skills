<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PhoneFarm – Sign In</title>
<link rel="icon" href="favicon.ico" type="image/x-icon"/>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--accent:#6c5ce7;--text:#dfe6e9;--muted:#636e72;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;height:100vh}
form{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px;width:320px;display:flex;flex-direction:column;gap:12px}
h2{font-size:1.4rem;text-align:center}
input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px}
input:focus{outline:none;border-color:var(--accent)}
button{background:var(--accent);color:#fff;border:none;padding:9px 14px;border-radius:6px;font-size:13px;cursor:pointer;transition:.2s}
button:hover{opacity:.9}
.error{color:#e17055;font-size:12px;min-height:16px}
</style>
</head>
<body>
<form id="login-form">
  <h2>Sign In</h2>
  <input type="text" id="username" placeholder="Username" required>
  <input type="password" id="password" placeholder="Password" required>
  <div class="error" id="error-msg"></div>
  <button type="submit">Login</button>
</form>
<script>
const form = document.getElementById('login-form');
const errorDiv = document.getElementById('error-msg');
form.addEventListener('submit', async e => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: new URLSearchParams({username, password})
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'Login failed');
    // store token (in memory for this session)
    localStorage.setItem('token', data.access_token);
    // redirect to dashboard
    window.location.href = '/dashboard/';
  } catch (err) {
    errorDiv.textContent = err.message;
  }
});
</script>
</body>
</html>
