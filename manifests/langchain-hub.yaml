name: 1ai-skills
version: 1.0.0
description: |
  World's largest AI skill ecosystem with 135 world-class skills featuring 
  expertise from history's greatest minds. Each skill includes world-class 
  personas, credentials, philosophies, and actionable frameworks.

author: oyi77
license: MIT
repository: https://github.com/oyi77/1ai-skills
homepage: https://github.com/oyi77/1ai-skills
donation_url: https://www.tip.md/oyi77

tags:
  - skills
  - personas
  - expertise
  - agents
  - automation
  - content
  - development
  - marketing
  - research
  - trading

categories:
  - agent-tools
  - prompts
  - productivity

hub_configuration:
  type: skill-pack
  format: markdown
  entry_point: README.md
  
  # How skills are loaded and invoked
  skill_loading:
    method: file_based
    pattern: "*/SKILL.md"
    auto_discover: true
  
  # Integration hints for LangChain
  integration:
    compatible_with:
      - langchain
      - langgraph
      - langserve
    chain_type: router
    
  # Resource requirements
  resources:
    memory: low
    compute: low
    storage: ~5MB

# Hub-specific metadata
hub_metadata:
  total_prompts: 135
  total_categories: 10
  personas_included: true
  examples_included: true
  documentation_quality: high
  maintenance_status: active

# Usage examples for Hub listing
examples:
  - title: "Rockefeller Wealth Strategy"
    description: "Apply vertical integration thinking to your business"
    invocation: |
      from langchain_skills import load_skill
      skill = load_skill("research/rockefeller_wealth")
      result = skill.apply(verticals=["production", "distribution"])
  
  - title: "Buffett Value Investing"
    description: "Analyze investments using Warren Buffett's methodology"
    invocation: |
      from langchain_skills import load_skill
      skill = load_skill("research/buffett_value_investing")
      result = skill.analyze(ticker="AAPL")

# Compatibility matrix
compatibility:
  python: ">=3.8"
  langchain: ">=0.1.0"
  langgraph: ">=0.0.20"

# Change log
changelog:
  - version: 1.0.0
    date: 2025-05-04
    changes:
      - "Initial release with 135 skills"
      - "9 categories covering automation, content, core, development, marketing, operations, productivity, research, sales, trading"
      - "World-class personas added to all skills"
      - "42% size reduction from deduplication"
