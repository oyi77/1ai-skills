name: Publish to Package Managers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write  # Required for Trusted Publishing

jobs:
  # Build once and upload artifacts for all jobs to use
  build:
    name: Build Package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python build tools
        run: pip install build

      - name: Build Python package
        working-directory: content/content-generator
        run: |
          python -m build .
        env:
          PYTHONPATH: scripts

      - name: Create NPM package tarball
        working-directory: content/content-generator
        run: |
          npm pack .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            content/content-generator/dist/*
            content/content-generator/package.json
            content/content-generator/skill.json
            content/content-generator/clawhub.json
          retention-days: 5

  # Publish to NPM
  publish-npm:
    name: Publish to NPM
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://npmjs.com
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Update package version
        working-directory: artifacts
        run: |
          npm pkg set version=${{ needs.build.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to NPM
        working-directory: artifacts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public

  # Publish to PyPI
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          print_hash: true

  # Publish to skills.sh
  publish-skills-sh:
    name: Publish to skills.sh
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Publish to skills.sh
        env:
          SKILLS_SH_TOKEN: ${{ secrets.SKILLS_SH_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if [ -z "$SKILLS_SH_TOKEN" ]; then
            echo "SKILLS_SH_TOKEN not set, skipping skills.sh publish"
            exit 0
          fi

          echo "Publishing to skills.sh..."

          # Read skill.json
          SKILL_JSON=$(cat artifacts/skill.json)

          # Publish to skills.sh API
          curl -s -X POST "https://api.skills.sh/v1/skills" \
            -H "Authorization: Bearer $SKILLS_SH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"content-generator\",
              \"version\": \"$VERSION\",
              \"manifest\": $SKILL_JSON,
              \"repository\": \"https://github.com/oyi77/1ai-skills\"
            }"

  # Publish to ClawHub
  publish-clawhub:
    name: Publish to ClawHub
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN not set, skipping ClawHub publish"
            exit 0
          fi

          echo "Publishing to ClawHub..."

          # Read clawhub.json
          CLAWHUB_JSON=$(cat artifacts/clawhub.json)

          # Publish to ClawHub API
          curl -s -X POST "https://api.clawhub.io/v1/skills" \
            -H "Authorization: Bearer $CLAWHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"content-generator\",
              \"version\": \"$VERSION\",
              \"manifest\": $CLAWHUB_JSON,
              \"repository\": \"https://github.com/oyi77/1ai-skills\"
            }"

  # Publish to GitHub Packages (optional, as backup)
  publish-github-package:
    name: Publish to GitHub Package Registry
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts

      - name: Publish to GitHub Registry (NPM)
        working-directory: artifacts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm publish --registry https://npm.pkg.github.com
        continue-on-error: true
