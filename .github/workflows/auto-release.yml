name: Auto Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Release Notes
        id: notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Self-Improving Agent Operating System Update
            
            ### Changes
            ${{ steps.notes.outputs.notes }}
            
            ### Installation
            ```bash
            npx skills add oyi77/1ai-skills@${{ github.ref_name }}
            ```
            
            ### npm install (alternative)
            ```bash
            npm install 1ai-skills@${{ github.ref_name }}
            ```
            
            ### Stats
            - Total Skills: Check repo
            - Meta-Skills: 12 (auto-evolve, auto-improve, auto-learn)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.com'
      
      - name: Publish to npmjs.com
        run: |
          npm config set //registry.npmjs.com/:_authToken=${{ secrets.NPM_TOKEN }}
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

