gemini:
  shared_link: "https://gemini.google.com/share/c7150b8213a4"
  default_ratio: "9:16"
  max_images: 8

categories:
  fashion:
    name: "Fashion & Apparel"
    environments:
      - "clean white studio background, professional e-commerce style"
      - "minimal gray backdrop, contemporary aesthetic"
      - "premium lifestyle setting, urban environment"
    lighting:
      - "soft diffused studio lighting"
      - "natural daylight"
      - "dramatic side lighting"
    default_style: "premium"
    
  electronics:
    name: "Electronics & Tech"
    environments:
      - "modern tech backdrop, sleek gradient"
      - "futuristic environment, holographic elements"
      - "clean workspace, professional setup"
    lighting:
      - "cool tech lighting"
      - "neon accents"
      - "clean white light"
    default_style: "modern"
    
  food:
    name: "Food & Beverage"
    environments:
      - "clean marble surface, culinary styling"
      - "warm rustic table, cozy atmosphere"
      - "premium restaurant backdrop, elegant presentation"
    lighting:
      - "warm natural light"
      - "dramatic food photography lighting"
      - "soft diffused"
    default_style: "appetizing"
    
  beauty:
    name: "Beauty & Skincare"
    environments:
      - "soft gradient background, feminine aesthetic"
      - "clean white spa setting, minimal decor"
      - "luxury vanity setup, premium feel"
    lighting:
      - "soft diffused beauty lighting"
      - "ring light effect"
      - "gentle side lighting"
    default_style: "elegant"
    
  home:
    name: "Home & Living"
    environments:
      - "cozy living room, warm natural setting"
      - "modern minimal interior, contemporary design"
      - "luxury home environment, premium lifestyle"
    lighting:
      - "warm ambient lighting"
      - "natural daylight"
      - "soft evening light"
    default_style: "cozy"

defaults:
  ratio: "9:16"
  style: "premium"
  lighting: "soft diffused"
  quality: "e-commerce professional"

output:
  folder: "output"
  format: "jpg"
  naming: "{category}_{product}_{timestamp}"

tiktok:
  required_disclosure: "AI-generated content"
  optimize_for: "vertical_9_16"
