# gitleaks config — https://github.com/gitleaks/gitleaks
# Extends default rules and adds allowlists for known-safe documentation examples.

[extend]
useDefault = true

[allowlist]
description = "Global allowlist: docs, placeholders, REDACTED markers, false positives"

# Paths to exclude entirely (documentation, examples)
paths = [
    '''cybersecurity/.*''',
    '''trading/tushare-finance/reference/.*''',
    '''references/code-review-checklist\.md''',
    '''\.gitleaks\.toml''',
]

# Regex patterns that are always allowed
regexes = [
    # Placeholder patterns
    '''YOUR_[A-Z_]+''',
    '''<[A-Z_]+>''',
    '''\$\{[A-Z_]+\}''',
    '''xxx[a-z]*-[a-z]+-token''',
    # AWS documentation examples
    '''AKIAIOSFODNN7EXAMPLE''',
    '''AKIAI44QH8DHBEXAMPLE''',
    '''AKIAEXPOSEDKEY123456''',
    '''AKIAXXXXXXXXXXXXXXXX''',
    '''wJalrXUtnFEMI/K7MDENG''',
    # Common doc placeholders
    '''xoxb-your-token''',
    '''ghp_xxx''',
    '''ghp_XXXXXXXXXXXX''',
    '''sk-abcdef1234567890abcdef''',
    '''sk-1234567890abcdef''',
    '''pb_live_PLACEHOLDER''',
    # Our own redaction markers from history rewrite
    '''REDACTED_[A-Z_]+''',
    # Documentation auth header placeholders
    '''\bAPI_TOKEN\b''',
    '''\bAPI_KEY\b''',
    '''\bany-string\b''',
    '''email@company\.com:''',
    '''email:API_TOKEN''',
    # Tenant/customer placeholders
    '''pf_tenant\w*''',
    '''pk_tenant\w*''',
    '''pb_live_\.\.\.''',
    '''0x_AB_CDEF_\d+_\.\.\.''',
    # Python false positives
    '''max_seq_length=\d+''',
    '''chain_id=self\.chain_id''',
    '''ssl_verify=not''',
    # Base64 of innocuous JSON like {"page":1}
    '''eyJwYWdlIjox''',
    '''eyJwYWdlIjoy''',
]
