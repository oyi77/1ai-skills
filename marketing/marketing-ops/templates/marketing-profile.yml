# Marketing Profile Template
# Copy this file to your project as marketing-profile.yml and fill in your details.
# This is the source of truth for all marketing-ops outputs.

# === BUSINESS IDENTITY ===
business:
  name: ""                          # Your business/brand name
  tagline: ""                       # One-line positioning
  website: ""                       # Primary website URL
  industry: ""                      # e.g., "B2B SaaS", "E-commerce", "Local Services"
  business_model: ""                # e.g., "Subscription", "One-time purchase", "Marketplace"
  stage: ""                         # "Pre-launch", "Early", "Growth", "Established"
  founded: ""                       # Year founded
  team_size: ""                     # Number of people
  location: ""                      # HQ or primary market
  languages:                        # Content languages
    - "en"

# === TARGET AUDIENCE ===
audience:
  primary:
    name: ""                        # Persona name (e.g., "Growth Marketer Maya")
    demographics: ""                # Age, role, company size, industry
    pain_points:                    # Top 3-5 pain points
      - ""
    goals:                          # What they want to achieve
      - ""
    objections:                     # Why they might NOT buy
      - ""
    channels:                       # Where they spend time online
      - ""
    budget_range: ""                # What they typically spend on solutions like yours
  secondary:                        # Optional second persona
    name: ""
    demographics: ""
    pain_points: []
    goals: []

# === PRODUCT/SERVICE ===
product:
  name: ""                          # Product name (if different from business)
  category: ""                      # What category/market you're in
  one_liner: ""                     # What it does in one sentence
  key_features:                     # Top 5 features
    - ""
  key_benefits:                     # Top 5 outcomes/benefits (not features)
    - ""
  differentiators:                  # What makes you unique vs competitors
    - ""
  pricing:
    model: ""                       # "Freemium", "Free trial", "Paid only", "Custom"
    starting_price: ""              # e.g., "$29/mo"
    currency: ""                    # e.g., "USD", "IDR"
  proof_points:                     # Stats, case studies, awards
    - ""

# === BRAND VOICE ===
voice:
  personality:                      # 3 adjectives that describe your brand
    - ""
  not:                              # 3 adjectives your brand is NOT
    - ""
  tone: ""                          # Default tone: "casual", "professional", "playful", "authoritative"
  emoji_usage: ""                   # "none", "minimal", "moderate", "heavy"
  formality: ""                     # "very-formal", "professional", "conversational", "casual"
  vocabulary:
    preferred:                      # Words/phrases you DO use
      - ""
    avoided:                        # Words/phrases you DON'T use
      - ""

# === MARKETING CHANNELS ===
channels:
  active:                           # Channels you currently use
    - platform: ""                  # e.g., "LinkedIn"
      handle: ""                    # e.g., "@yourbrand"
      frequency: ""                 # e.g., "3x/week"
      primary_goal: ""              # e.g., "thought leadership"
  planned:                          # Channels you plan to start
    - ""
  email:
    provider: ""                    # e.g., "Mailchimp", "ConvertKit", "Brevo"
    list_size: ""                   # Current subscriber count
    send_frequency: ""              # e.g., "weekly newsletter"
  paid_ads:
    platforms:                      # Active ad platforms
      - ""
    monthly_budget: ""              # Total ad spend budget
    primary_objective: ""           # "leads", "sales", "awareness"

# === COMPETITORS ===
competitors:
  direct:                           # Direct competitors
    - name: ""
      url: ""
      positioning: ""               # Their key differentiator
  indirect:                         # Indirect/alternative solutions
    - name: ""
      url: ""

# === GOALS ===
goals:
  quarterly:                        # This quarter's marketing goals
    - metric: ""                    # e.g., "Monthly leads"
      current: ""                   # Current value
      target: ""                    # Target value
  north_star: ""                    # The one metric that matters most
