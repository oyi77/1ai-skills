# SEO Optimizer — Configuration
# Customize before deployment

# ============================================
# SEO TOOLKIT SETTINGS
# ============================================
seo:
  target_region: GLOBAL              # US | EU | APAC | ID | GLOBAL
  default_language: en               # en | id | zh | multi
  crawl_depth: 3                     # Max crawl depth for audits
  max_pages_per_audit: 500           # Crawl limit
  respect_robots_txt: true           # Always follow robots.txt

  # Keyword research settings
  keyword_research:
    min_search_volume: 100           # Skip keywords below this volume
    max_keyword_difficulty: 70       # Skip keywords above this difficulty
    suggest_long_tail: true          # Auto-suggest long-tail variants
    intent_mapping: true             # Classify by informational/commercial/transactional

  # Content optimization
  content:
    min_word_count: 1000             # Minimum words for ranking pages
    keyword_density_max: 0.02        # 2% max keyword density
    internal_links_min: 3            # Minimum internal links per page
    external_links_min: 2            # Minimum external authority links

  # Technical SEO
  technical:
    max_page_load_ms: 3000           # Target <3s load time
    mobile_first: true               # Mobile-first indexing
    schema_org: true                 # Auto-generate schema markup
    core_web_vitals: true            # Check CWV metrics
    ssl_required: true               # HTTPS enforcement

  # GEO (Generative Engine Optimization)
  geo:
    enabled: true
    ai_overviews: true               # Optimize for Google AI Overviews
    llms_txt: true                   # Generate/maintain llms.txt
    citation_readiness: true         # Passage-level citability
    ai_crawler_access: true          # GPTBot, ClaudeBot accessibility

# ============================================
# INTEGRATIONS
# ============================================
integrations:
  google_search_console: true        # GSC API integration
  google_analytics: true             # GA4 integration
  ahrefs_api: false                  # Requires API key
  semrush_api: false                 # Requires API key

# ============================================
# REPORTING
# ============================================
reporting:
  format: markdown                   # markdown | json | pdf
  include_competitor_analysis: true
  include_technical_audit: true
  include_content_brief: true
  track_ranking_changes: true
  weekly_digest: true

# ============================================
# CROSS-REFERENCES
# ============================================
cross_references:
  - marketing/marketing-ops          # Full marketing & sales operating system
  - marketing/content-creator        # Content strategy integration
  - marketing/analytics-dashboard    # Analytics and reporting
  - content/viral/trend-jacker       # Trending content creation
  - content/viral/viral-hook         # Viral content optimization
  - references/seo-checklist.md      # Shared SEO checklist
  - references/marketing-checklist.md # Shared marketing checklist
